components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - ok
        - service
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
          example: equipment-backend

    User:
      type: object
      required:
        - employeeId
        - email
        - name
        - department
        - role
      properties:
        employeeId:
          type: string
          example: EMP-0142
        email:
          type: string
          format: email
          example: misaki.tanaka@example.com
        name:
          type: string
          example: 田中 美咲
        department:
          type: string
          example: プロダクト開発部
        role:
          type: string
          example: member

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: misaki.tanaka@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: Passw0rd!

    LoginResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
        - user
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: string
          example: 1h
        user:
          $ref: "#/components/schemas/User"

    LogoutResponse:
      type: object
      required:
        - ok
        - message
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: logged out

    InventoryStat:
      type: object
      required:
        - label
        - value
        - caption
      properties:
        label:
          type: string
          example: 登録備品
        value:
          type: string
          example: "28"
        caption:
          type: string
          example: ノートPC 12 / モニタ 10 / 周辺機器 6

    EquipmentItem:
      type: object
      required:
        - id
        - name
        - category
        - location
        - status
        - assignee
        - requestedBy
        - reservationPeriod
        - specs
        - note
      properties:
        id:
          type: string
          example: eq-001
        name:
          type: string
          example: ThinkPad X1 Carbon Gen 12
        category:
          type: string
          example: ノートPC
        location:
          type: string
          example: 東京オフィス 4F
        status:
          type: string
          enum:
            - available
            - in_use
            - reserved
          example: available
        assignee:
          type: string
          nullable: true
          example: null
        requestedBy:
          type: string
          nullable: true
          example: null
        reservationPeriod:
          type: string
          example: 即日 - 2026/05/12
        specs:
          type: array
          items:
            type: string
          example:
            - Core Ultra 7
            - 32GB RAM
            - 14 inch
        note:
          type: string
          example: 営業同行用に軽量モデル。USB-C 充電器を付属。

    EquipmentUpsertRequest:
      type: object
      required:
        - id
        - name
        - category
        - location
        - reservationPeriod
        - specs
        - note
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        category:
          type: string
          enum:
            - ノートPC
            - モニタ
            - 周辺機器
        location:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - available
            - in_use
            - reserved
        assignee:
          type: string
          nullable: true
        requestedBy:
          type: string
          nullable: true
        reservationPeriod:
          type: string
          pattern: ".*\\d{4}\\/\\d{2}\\/\\d{2}$"
        specs:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        note:
          type: string
          minLength: 1

    EquipmentPatchRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          enum:
            - ノートPC
            - モニタ
            - 周辺機器
        location:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - available
            - in_use
            - reserved
        assignee:
          type: string
          nullable: true
        requestedBy:
          type: string
          nullable: true
        reservationPeriod:
          type: string
          pattern: ".*\\d{4}\\/\\d{2}\\/\\d{2}$"
        specs:
          type: array
          items:
            type: string
            minLength: 1
        note:
          type: string
          minLength: 1

    EquipmentCheckoutRequest:
      type: object
      required:
        - assignee
        - requestedBy
        - reservationPeriod
      properties:
        assignee:
          type: string
          minLength: 1
        requestedBy:
          type: string
          minLength: 1
        reservationPeriod:
          type: string
          pattern: ".*\\d{4}\\/\\d{2}\\/\\d{2}$"

    EquipmentRequestCreateRequest:
      type: object
      required:
        - reservationPeriod
        - purpose
      properties:
        reservationPeriod:
          type: string
          pattern: ".*\\d{4}\\/\\d{2}\\/\\d{2}$"
          example: 2026/07/01 - 2026/07/10
        purpose:
          type: string
          minLength: 2
          maxLength: 200
          example: 展示会利用

    EquipmentRequestRejectRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 2
          maxLength: 200
          example: 日程が重複

    EquipmentRequest:
      type: object
      required:
        - id
        - equipmentId
        - requesterUserId
        - requesterName
        - requesterEmail
        - reservationPeriod
        - purpose
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          example: 101
        equipmentId:
          type: string
          example: eq-001
        requesterUserId:
          type: integer
          example: 5
        requesterName:
          type: string
          example: 山本 愛
        requesterEmail:
          type: string
          format: email
          example: ai.yamamoto@example.com
        reservationPeriod:
          type: string
          example: 2026/07/01 - 2026/07/10
        purpose:
          type: string
          example: 展示会利用
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - cancelled
          example: pending
        decisionReason:
          type: string
          nullable: true
          example: null
        decidedByUserId:
          type: integer
          nullable: true
          example: null
        decidedByName:
          type: string
          nullable: true
          example: null
        decidedAt:
          type: string
          format: date-time
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PendingCountResponse:
      type: object
      required:
        - pendingCount
      properties:
        pendingCount:
          type: integer
          example: 3

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: equipment not found
