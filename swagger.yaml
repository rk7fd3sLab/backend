openapi: 3.0.3
info:
  title: Equipment Loan Backend API
  version: 1.0.0
  description: Expressで実装された備品貸出API
servers:
  - url: http://localhost:4000
    description: Local development
paths:
  /api/health:
    get:
      tags:
        - System
      summary: ヘルスチェック
      operationId: getHealth
      responses:
        "200":
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                success:
                  value:
                    ok: true
                    service: equipment-backend

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: メールアドレスとパスワードでログイン
      description: 同一アカウントで再ログインすると、それ以前に発行されたトークンは無効化される
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: 入力不備
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validationError:
                  value:
                    message: email and password are required
                invalidEmail:
                  value:
                    message: email must be a valid address
                shortPassword:
                  value:
                    message: password must be at least 8 characters
        "401":
          description: 認証失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidCredentials:
                  value:
                    message: invalid credentials

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: ログアウト
      description: bearerAuth を使ってログアウトする。実行後はそれまでのトークンが無効化される
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                success:
                  value:
                    ok: true
                    message: logged out
        "401":
          description: 未認証または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidated:
                  value:
                    message: token expired by newer login or logout

  /api/user:
    get:
      tags:
        - User
      summary: ログインユーザー情報取得
      description: bearerAuth を使って取得する（最新ログインのトークンのみ有効）
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ユーザー情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: 未認証または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidated:
                  value:
                    message: token expired by newer login or logout

  /api/stats:
    get:
      tags:
        - Inventory
      summary: 在庫統計一覧取得
      description: member以上のbearerAuthが必要。備品テーブルを集計して統計を返す
      operationId: getStats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 在庫統計
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryStat"
              examples:
                summary:
                  value:
                    - label: 登録備品
                      value: "5"
                      caption: ノートPC 2 / モニタ 2 / 周辺機器 1
                    - label: 使用中
                      value: "2"
                      caption: 外出・在宅勤務向けに貸出中
                    - label: 本日の返却予定
                      value: "0"
                      caption: 管理画面から返却処理可能
        "403":
          description: member未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    message: forbidden

  /api/equipment:
    get:
      tags:
        - Equipment
      summary: 備品一覧取得
      description: member以上のbearerAuthが必要。条件絞り込みとページングに対応し、ID昇順で一覧を返す
      operationId: getEquipment
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - available
              - in_use
              - reserved
        - name: category
          in: query
          required: false
          description: ノートPC / モニタ / 周辺機器 のいずれか
          schema:
            type: string
            enum:
              - ノートPC
              - モニタ
              - 周辺機器
        - name: location
          in: query
          required: false
          description: 部分一致検索（空文字不可）
          schema:
            type: string
            minLength: 1
        - name: keyword
          in: query
          required: false
          description: id / name / note に対する部分一致検索（空文字不可）
          schema:
            type: string
            minLength: 1
        - name: page
          in: query
          required: false
          description: limit とセットで指定
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          required: false
          description: page とセットで指定（1-100）
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: 備品一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquipmentItem"
              examples:
                list:
                  value:
                    - id: eq-001
                      name: ThinkPad X1 Carbon Gen 12
                      category: ノートPC
                      location: 東京オフィス 4F
                      status: available
                      assignee: null
                      requestedBy: null
                      reservationPeriod: 即日 - 2026/05/12
                      specs:
                        - Core Ultra 7
                        - 32GB RAM
                        - 14 inch
                      note: 営業同行用に軽量モデル。USB-C 充電器を付属。
        "403":
          description: member未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    message: forbidden
        "400":
          description: クエリ不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Equipment
      summary: 備品追加
      description: admin の bearerAuth が必要。新規備品を登録する
      operationId: createEquipment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentUpsertRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentItem"
        "400":
          description: 入力不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 同一IDが既に存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/equipment/{id}:
    get:
      tags:
        - Equipment
      summary: 備品詳細取得
      description: member以上のbearerAuthが必要。備品IDで詳細を返す
      operationId: getEquipmentById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "備品ID（例: eq-001）"
          schema:
            type: string
      responses:
        "200":
          description: 備品詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentItem"
        "403":
          description: member未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    message: forbidden
        "404":
          description: 備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    message: equipment not found
    patch:
      tags:
        - Equipment
      summary: 備品更新
      description: admin の bearerAuth が必要。指定IDの備品情報を部分更新する
      operationId: updateEquipment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentPatchRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentItem"
        "400":
          description: 入力不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Equipment
      summary: 備品削除
      description: admin の bearerAuth が必要。指定IDの備品を削除する
      operationId: deleteEquipment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 削除成功
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/equipment/{id}/checkout:
    post:
      tags:
        - Equipment
      summary: 備品貸出開始
      description: admin の bearerAuth が必要。空き備品を貸出中へ変更する
      operationId: checkoutEquipment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentCheckoutRequest"
      responses:
        "200":
          description: 貸出開始成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentItem"
        "400":
          description: 入力不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 備品が貸出可能状態でない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/equipment/{id}/return:
    post:
      tags:
        - Equipment
      summary: 備品返却処理
      description: admin の bearerAuth が必要。貸出中/予約中備品を空きへ戻す
      operationId: returnEquipment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 返却処理成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentItem"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 既に空き状態
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/equipment/{id}/requests:
    get:
      tags:
        - Request
      summary: 備品単位の申請履歴
      description: admin の bearerAuth が必要。指定備品の申請履歴を新しい順で返す
      operationId: getEquipmentRequests
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 申請履歴一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquipmentRequest"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Request
      summary: 備品貸出申請作成
      description: member以上の bearerAuth が必要。対象備品に対する申請を作成する
      operationId: createEquipmentRequest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentRequestCreateRequest"
      responses:
        "201":
          description: 申請作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentRequest"
        "400":
          description: 入力不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: member未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 申請競合（備品使用中など）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests/me:
    get:
      tags:
        - Request
      summary: 自分の申請一覧
      description: member以上の bearerAuth が必要。ログインユーザーの申請を返す
      operationId: getMyRequests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 申請一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquipmentRequest"
        "403":
          description: member未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests:
    get:
      tags:
        - Request
      summary: 全申請一覧
      description: admin の bearerAuth が必要。status/equipmentId/requesterEmail で絞り込み可能
      operationId: getAllRequests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
              - cancelled
        - name: equipmentId
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: requesterEmail
          in: query
          required: false
          schema:
            type: string
            format: email
            minLength: 1
      responses:
        "200":
          description: 全申請一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquipmentRequest"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: クエリ不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests/pending-count:
    get:
      tags:
        - Request
      summary: 承認待ち件数
      description: admin の bearerAuth が必要。pending 申請件数を返す
      operationId: getPendingRequestCount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 件数取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingCountResponse"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests/{requestId}:
    get:
      tags:
        - Request
      summary: 申請詳細
      description: member以上の bearerAuth が必要。本人申請またはadminのみ参照可
      operationId: getRequestById
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 申請詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentRequest"
        "400":
          description: requestId 不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 申請が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests/{requestId}/approve:
    post:
      tags:
        - Request
      summary: 申請承認
      description: admin の bearerAuth が必要。pending 申請を承認し対象備品を reserved に更新する
      operationId: approveRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 承認成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentRequest"
        "400":
          description: requestId 不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 申請または備品が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 申請状態または備品状態が承認不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests/{requestId}/reject:
    post:
      tags:
        - Request
      summary: 申請却下
      description: admin の bearerAuth が必要。pending 申請を却下する
      operationId: rejectRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentRequestRejectRequest"
      responses:
        "200":
          description: 却下成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentRequest"
        "400":
          description: 入力不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: admin未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 申請が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: pending以外で却下不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/requests/{requestId}/cancel:
    post:
      tags:
        - Request
      summary: 申請取り下げ
      description: member以上の bearerAuth が必要。申請者本人またはadminが pending 申請を取り下げる
      operationId: cancelRequest
      security:
        - bearerAuth: []
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: 取り下げ成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EquipmentRequest"
        "400":
          description: requestId 不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 権限不足
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 申請が見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: pending以外は取り下げ不可
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/active-loans:
    get:
      tags:
        - Equipment
      summary: 貸出中または予約中の備品一覧取得
      description: member以上のbearerAuthが必要。status が available 以外の備品を返す
      operationId: getActiveLoans
      security:
        - bearerAuth: []
      responses:
        "403":
          description: member未満、未ログイン、または不正トークン
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value:
                    message: forbidden
        "200":
          description: 貸出中・予約中備品一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquipmentItem"
              examples:
                active:
                  value:
                    - id: eq-002
                      name: Dell 27 4K USB-C Monitor
                      category: モニタ
                      location: 大阪オフィス 2F
                      status: in_use
                      assignee: 佐藤 亮
                      requestedBy: 佐藤 亮
